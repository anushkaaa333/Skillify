<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skillify | Forgot Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="card auth-card text-center">
            <h1 class="color-primary m-0 mb-3">Skillify</h1>
            <h2>Reset Password</h2>
            
            <form method="POST" action="/forgot_password" style="text-align: left;">
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label>New Password:</label>
                    <input type="password" name="new_password" required>
                </div>
                
                <button type="submit" class="btn">Reset Password</button>
            </form>
            
            <div style="margin-top: 24px;">
                <a href="/login" class="color-primary font-bold text-sm">Back to Login</a>
            </div>
        </div>
    </div>
</body>
</html>
