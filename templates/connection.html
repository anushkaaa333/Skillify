<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect - Skillify</title>
  <link rel="stylesheet" href="../static/css/styles.css">
</head>
<body>
  
  <nav class="navbar">
    <a href="javascript:history.back()" class="nav-brand">Skillify</a>
    <div class="nav-links">
      <a href="javascript:history.back()" class="nav-link">Back</a>
    </div>
    <div class="user-menu">
      <a href="profile.html" class="nav-link">Profile</a>
    </div>
  </nav>

  <div class="dashboard-container" style="max-width: 700px; padding-top: 4rem;">
    
    <div class="glass-card">
      <div class="text-center mb-4">
        <h1 class="mb-2">Request Connection</h1>
        <p>Propose a skill exchange with <strong style="color: var(--primary);">Alex Martin</strong></p>
      </div>

      <div class="glass-panel mb-4" style="padding: 1.5rem; background: rgba(0,0,0,0.2);">
        <div class="d-flex justify-between align-center">
          <div class="text-center">
            <div class="avatar mb-2" style="margin: 0 auto; background: var(--secondary);">You</div>
            <span style="font-size: 0.85rem;">Jane Doe</span>
          </div>
          
          <div style="flex: 1; text-align: center; position: relative;">
            <div style="height: 2px; background: var(--surface-border); width: 100%;"></div>
            <span class="badge badge-secondary" style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--bg-dark);">Exchange</span>
          </div>

          <div class="text-center">
            <div class="avatar mb-2" style="margin: 0 auto; background: #10b981;">AM</div>
            <span style="font-size: 0.85rem;">Alex Martin</span>
          </div>
        </div>
      </div>

      <form id="connectionForm" class="needs-validation" novalidate onsubmit="event.preventDefault(); alert('Request Sent Successfully!'); setTimeout(() => { window.location.href='student_dashboard.html'; }, 500);">
        
        <div class="form-group">
          <label class="form-label">What do you want to learn from Alex?</label>
          <select class="form-control" required>
            <option value="" disabled selected>Select a skill...</option>
            <option value="uiux">UI/UX Design</option>
            <option value="figma">Figma Mastery</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">What can you teach Alex in return?</label>
          <select class="form-control" required>
            <option value="" disabled selected>Select a skill...</option>
            <option value="python">Python Basics</option>
            <option value="nothing">Just want to pay/say thanks (No skill exchange right now)</option>
          </select>
        </div>

        <div class="form-group mb-4">
          <label class="form-label">Initial Message</label>
          <textarea class="form-control" rows="4" placeholder="Hi Alex, I'd love to learn UI/UX from you. In return, I can teach you Python basics as you listed on your profile..." required></textarea>
        </div>

        <div class="d-flex gap-2">
          <button type="button" class="btn btn-outline" style="flex: 1;" onclick="history.back()">Cancel</button>
          <button type="submit" class="btn btn-primary" style="flex: 2;">Send Request</button>
        </div>

      </form>
    </div>

  </div>

  <script src="../static/js/main.js"></script>
</body>
</html>
