<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skillify | Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Main Center Wrapper -->
    <div class="auth-wrapper">
        <div class="card auth-card">
            
            <div class="text-center mb-3">
                <h1 class="color-primary m-0">Join Skillify</h1>
                <p>Create your new account.</p>
            </div>
            
            <form method="POST" action="/signup" onsubmit="sessionStorage.setItem('toastMessage', 'Signup successful! Please login.');">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="username" placeholder="Alex Johnson" required minlength="2">
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="example@email.com" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required minlength="4">
                </div>
                
                <div class="form-group">
                    <label>Your Role</label>
                    <select name="role" required>
                        <option value="" disabled selected>Select role</option>
                        <option value="student">Student</option>
                        <option value="mentor">Mentor</option>
                    </select>
                </div>
                
                <button type="submit" class="btn">Create Account</button>
            </form>
            
            <div class="text-center" style="margin-top: 24px;">
                <p class="text-sm m-0">Already have an account? <a href="/login" class="color-primary font-bold">Log In</a></p>
            </div>

        </div>
    </div>
    
    <!-- App Footer -->
    <footer>&copy; Skillify | Built by Student</footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
