<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skillify | Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Main Center Wrapper -->
    <div class="auth-wrapper">
        <div class="card auth-card">
            
            <div class="text-center mb-3">
                <h1 class="color-primary m-0">Skillify</h1>
                <p>Welcome back! Please login.</p>
            </div>
            
            <form method="POST" action="/login" onsubmit="sessionStorage.setItem('toastMessage', 'Checking credentials...');">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="student@email.com" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required minlength="4">
                    <div style="margin-top: 8px; text-align: right;">
                        <a href="/forgot_password" class="text-sm color-primary">Forgot Password?</a>
                    </div>
                </div>
                
                <button type="submit" class="btn">Log In</button>
            </form>
            
            <div class="text-center" style="margin-top: 24px;">
                <p class="text-sm m-0">Don't have an account? <a href="/signup" class="color-primary font-bold">Sign Up</a></p>
            </div>

        </div>
    </div>
    
    <!-- App Footer -->
    <footer>&copy; Skillify | Built by Student</footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
