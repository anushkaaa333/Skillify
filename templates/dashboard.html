<!DOCTYPE html>
<html>
<head>
<title>Skillify Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Poppins', sans-serif;
    background:linear-gradient(120deg,#f5f7ff,#fff0f7);
}

/* pop animation */
@keyframes pop {
    from {opacity:0; transform:scale(0.9);}
    to {opacity:1; transform:scale(1);}
}

.container {
    padding:40px;
    animation: pop 0.5s ease;
}

/* header */
.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo {
    width:60px;
}

.logout {
    background:#ff4d6d;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:20px;
    cursor:pointer;
}

/* cards */
.card-section {
    margin-top:30px;
    display:flex;
    gap:20px;
}

.card {
    background:white;
    padding:25px;
    border-radius:12px;
    width:250px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2 {
    color:#4a6cf7;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <img src="{{ url_for('static', filename='logo.png.jpeg') }}" class="logo">
    <button class="logout">Logout</button>
</div>

<h2>Welcome to Skillify Dashboard</h2>

<div class="card-section">

<div class="card">
<h3>Your Skills</h3>
<p>Add or manage skills you offer.</p>
</div>

<div class="card">
<h3>Find Mentors</h3>
<p>Explore available mentors.</p>
</div>

<div class="card">
<h3>Sessions</h3>
<p>View ongoing sessions.</p>
</div>

</div>

</div>

</body>
</html>
