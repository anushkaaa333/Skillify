<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(120deg, #5f7fff, #ff8a7f);
            color: white;
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
        }

        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .card {
            background: white;
            color: black;
            padding: 25px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .logout {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px;
            background: red;
            color: white;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<a href="/logout">
    <button class="logout">Logout</button>
</a>

<div class="container">
    <h1>Welcome to Skillify 🚀</h1>

    <div class="card-container">

        <!-- Browse Skills -->
        <div class="card" onclick="window.location.href='/browse_skills'">
            <h3>Browse Skills</h3>
            <p>Find mentors</p>
        </div>

        <!-- My Learning -->
        <div class="card">
            <h3>My Learning</h3>
            <p>Your progress</p>
        </div>

        <!-- Profile -->
        <div class="card" onclick="window.location.href='/profile'">
            <h3>Profile</h3>
            <p>Your info</p>
        </div>

    </div>
</div>

</body>
</html>
