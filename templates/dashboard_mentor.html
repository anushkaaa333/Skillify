<!DOCTYPE html>
<html>
<head>
    <title>Mentor Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(120deg, #ff7e5f, #feb47b);
            color: white;
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
        }

        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .card {
            background: white;
            color: black;
            padding: 25px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #ff7e5f;
            color: white;
            cursor: pointer;
        }

        .logout {
            position: absolute;
            top: 20px;
            right: 20px;
            background: red;
        }

        /* Popup */
        .popup {
            display: none;
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            top: 0;
            left: 0;
        }

        .popup-content {
            background: white;
            color: black;
            padding: 30px;
            width: 300px;
            margin: 100px auto;
            border-radius: 10px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
        }
    </style>
</head>

<body>

<a href="/logout">
    <button class="btn logout">Logout</button>
</a>

<div class="container">
    <h1>Mentor Dashboard 👨‍🏫</h1>

    <div class="card-container">

        <!-- Add Skill -->
        <div class="card" onclick="openSkill()">
            <h3>Add Skill</h3>
            <p>Teach something</p>
        </div>

        <!-- Requests -->
        <div class="card" onclick="window.location.href='/mentor_requests'">
            <h3>Requests</h3>
            <p>View learner requests</p>
        </div>

        <!-- Profile -->
        <div class="card" onclick="window.location.href='/profile'">
            <h3>Profile</h3>
            <p>Your info</p>
        </div>

    </div>
</div>

<!-- Add Skill Popup -->
<div id="skillPopup" class="popup">
    <div class="popup-content">
        <h3>Add Skill</h3>

        <form method="POST" action="/add_skill">
            <input type="text" name="skill" placeholder="Enter skill" required>
            <br><br>
            <button class="btn">Add</button>
        </form>

        <br><br>
        <button class="btn" onclick="closeSkill()">Close</button>
    </div>
</div>

<script>
function openSkill() {
    document.getElementById("skillPopup").style.display = "block";
}

function closeSkill() {
    document.getElementById("skillPopup").style.display = "none";
}
</script>

</body>
</html>
