<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skillify | My Profile</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar glass">
        <a href="dashboard_student.html" class="nav-brand text-gradient">Skillify</a>
        <div class="nav-links">
            <a href="dashboard_student.html">Dashboard</a>
            <a href="profile.html" class="active">Profile</a>
            <a href="login.html" class="btn btn-outline" style="padding: 8px 16px;">Logout</a>
        </div>
    </nav>

    <div class="container fade-in">
        <div class="dashboard-header">
            <div>
                <h1 class="text-gradient">Your Profile</h1>
                <p>Manage your personal information and links</p>
            </div>
        </div>
        
        <div class="profile-section">
            <div class="glass glass-card">
                <form id="profileForm" method="POST" action="/profile">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" value="Alex Johnson" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email (Read-Only)</label>
                        <input type="email" id="email" name="email" value="alex@example.com" readonly>
                    </div>
                    <div class="form-group">
                        <label for="github">GitHub URL</label>
                        <input type="url" id="github" name="github" placeholder="https://github.com/yourusername" value="https://github.com/alexcode">
                    </div>
                    <div class="form-group">
                        <label for="bio">Short Bio</label>
                        <textarea id="bio" name="bio" rows="4" placeholder="Tell us about yourself...">Passionate about coding, currently learning to build cool things.</textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
